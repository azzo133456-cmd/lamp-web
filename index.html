<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>路燈查詢地圖</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- 自己的 CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

 <!-- 搜尋 UI -->
  <div id="ui">
    <input id="lampInput" type="text" placeholder="輸入路燈編號，例如 0400001">
    <button onclick="searchLamp()">查詢</button>
  </div>

  <!-- 地圖 -->
  <div id="map"></div>

  <!-- 📍 浮動定位按鈕 -->
  <button id="locateBtn" onclick="locateUser()">📍</button>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="map.js"></script>

</body>
</html>
