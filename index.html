<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>路燈查詢地圖</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- 自己的 CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- 未來 UI 區域（搜尋框、按鈕都可以放這裡） -->
  <div id="ui">
    <input id="lampInput" type="text" placeholder="輸入路燈編號，例如 0400001">
    <button onclick="searchLamp()">查詢</button>
  </div>

  <!-- 地圖容器 -->
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- 自己的 JS -->
  <script src="map.js"></script>

</body>
</html>
